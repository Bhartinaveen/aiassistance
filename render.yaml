services:
  # Backend (FastAPI)
  - type: web
    name: ai-behavior-engine
    runtime: python
    rootDir: scaling-palm-tree/backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend (Next.js)
  - type: web
    name: ai-behavior-frontend
    runtime: node
    rootDir: scaling-palm-tree/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
