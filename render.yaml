services:
  - type: web
    name: ai-behavior-backend
    runtime: python
    rootDir: scaling-palm-tree/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
